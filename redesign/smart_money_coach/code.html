<!-- TopAppBar -->

</button>

<div class="mb-section-gap flex flex-col items-start">

<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px]">Your personalized financial guide powered by UBA AI.</p>
</div>
<!-- Chat Area -->
<div class="flex-1 flex flex-col justify-end space-y-6 pb-stack-lg">
<!-- AI Message Bubble -->
<div class="flex items-end gap-3 w-full max-w-[85%] self-start">
<!-- Avatar/Icon Stamp Style -->
<div class="w-12 h-12 flex-shrink-0 flex items-center justify-center bg-white border-2 border-on-surface rounded-xl transform -rotate-3" style="box-shadow: 2px 2px 0px #1a1c1c;">
<span class="material-symbols-outlined text-on-surface" style="font-size: 24px;">smart_toy</span>
</div>
<div class="bg-inverse-surface text-inverse-on-surface p-4 rounded-2xl rounded-bl-sm font-body-md text-body-md shadow-md">
                    Hi! I've reviewed your May transactions. You spent 15% less on dining out this month. Great job! What would you like to explore next?
                </div>
</div>
<!-- Suggested Prompts -->
<div class="flex flex-col gap-3 w-full mt-stack-md">
<p class="font-label-md text-label-md text-on-surface-variant ml-2">Suggested</p>
<div class="flex flex-wrap gap-2">
<button class="bg-surface text-on-surface border border-outline-variant px-4 py-2 rounded-full font-body-sm text-body-sm hover:bg-surface-container-low transition-colors flex items-center gap-2">

                    </button>
<button class="bg-surface text-on-surface border border-outline-variant px-4 py-2 rounded-full font-body-sm text-body-sm hover:bg-surface-container-low transition-colors flex items-center gap-2">
                        Savings tips
                    </button>
<button class="bg-surface text-on-surface border border-outline-variant px-4 py-2 rounded-full font-body-sm text-body-sm hover:bg-surface-container-low transition-colors flex items-center gap-2">
                        Upcoming bills
                    </button>
</div>
</div>
</div>

<div class="flex items-center gap-3 bg-surface-container-lowest border border-outline-variant rounded-full pl-4 pr-1 py-1 shadow-sm">
<input class="flex-1 bg-transparent border-none focus:ring-0 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 h-10 outline-none" placeholder="Ask your money coach..." type="text"/>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-primary text-on-primary hover:bg-primary/90 transition-colors transform active:scale-95">
