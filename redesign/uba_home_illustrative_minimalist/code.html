<!DOCTYPE html>

<style>
        body { font-family: 'Hanken Grotesk', sans-serif; min-height: max(884px, 100dvh); }
        .bg-grid-pattern {
            background-color: #fbfbf9;
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(0, 0, 0, 0.04) 1px, transparent 1px),

        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col items-center">
<div class="w-full max-w-md bg-grid-pattern min-h-screen relative shadow-lg overflow-hidden pb-24">
<!-- Header Section -->
<div class="px-gutter pt-8 pb-6 relative z-10">
<div class="flex justify-between items-center mb-8">
<div class="flex items-center gap-2 bg-dark-pill rounded-full px-4 py-1.5">
<span class="font-label-md text-white">NG</span>
<span class="material-symbols-outlined text-[16px] text-white">expand_more</span>
</div>
<div class="flex items-center gap-2">
<span class="font-display-lg text-dark-pill tracking-tighter italic text-2xl font-bold">UBA</span>
</div>
<div class="flex items-center gap-2">
<button class="w-10 h-10 rounded-full bg-dark-pill flex items-center justify-center relative hover:bg-black transition-colors">
<span class="material-symbols-outlined text-white text-xl">notifications</span>
<span class="absolute top-2 right-2 w-2 h-2 bg-primary rounded-full border border-dark-pill"></span>
</button>
</div>
</div>
<div class="mb-6">
<h1 class="font-headline-md text-dark-pill text-3xl mb-1">Good morning, <br/>Oluwaseun</h1>
<span class="font-body-sm text-gray-500">Tue, 12 May 2026</span>
</div>
<button class="w-full bg-accent-yellow hover:bg-[#e6b800] text-dark-pill rounded-full py-4 px-6 flex justify-between items-center transition-colors shadow-sm">
<span class="font-headline-sm text-[18px]">New Action</span>
<div class="w-8 h-8 bg-dark-pill rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-white text-sm">arrow_forward</span>
</div>
</button>
</div>
<!-- Main Content Canvas -->
<main class="px-gutter flex flex-col gap-section-gap">
<!-- Balance Card -->
<div class="bg-dark-pill rounded-[2rem] p-6 relative overflow-hidden shadow-md">
<div class="relative z-10 text-white">
<p class="font-label-md text-gray-400 mb-2 uppercase tracking-widest text-[10px]">Total Balance</p>
<h2 class="font-display-lg mb-1 flex items-start text-4xl">
<span class="text-2xl mt-1.5 mr-1 text-gray-300">₦</span>847,320.00
                    </h2>
<p class="font-body-sm text-gray-400 mt-2">UBA Savings · UBA Current</p>
</div>
<!-- Watermark -->
<div class="absolute right-[-10%] top-1/2 -translate-y-1/2 opacity-5 pointer-events-none">
<span class="font-display-lg text-9xl font-bold">75</span>
</div>
</div>
<!-- Quick Actions Pills -->
<div>
<h3 class="font-headline-sm text-dark-pill mb-4 text-lg">Quick Actions</h3>
<div class="flex flex-wrap gap-2.5">
<button class="bg-dark-pill text-white px-5 py-2.5 rounded-full font-body-sm hover:bg-black transition-colors">
                        Transfer
                    </button>
<button class="bg-dark-pill text-white px-5 py-2.5 rounded-full font-body-sm hover:bg-black transition-colors">
                        Pay Bills
                    </button>
<button class="bg-dark-pill text-white px-5 py-2.5 rounded-full font-body-sm hover:bg-black transition-colors">
                        Airtime
                    </button>
<button class="bg-dark-pill text-white px-5 py-2.5 rounded-full font-body-sm hover:bg-black transition-colors">
                        More
                    </button>
</div>
</div>
<!-- For You Section -->
<div>
<div class="flex justify-between items-end mb-4">
<h3 class="font-headline-sm text-dark-pill text-lg">For You</h3>
<button class="text-sm text-gray-500 font-medium hover:text-dark-pill transition-colors">See All</button>
</div>
<div class="flex gap-4 overflow-x-auto hide-scrollbar pb-4 snap-x">
<!-- Smart Money Card (Pink) -->
<div class="min-w-[220px] bg-accent-pink rounded-[2rem] p-6 relative overflow-hidden shrink-0 snap-start shadow-sm cursor-pointer group">
<!-- Decorative SVG -->
<svg class="absolute bottom-16 right-4 w-16 h-16 opacity-80" viewbox="0 0 100 100">
<path d="M10,80 Q30,40 50,80 T90,80" fill="none" stroke="#1a1c1c" stroke-linecap="round" stroke-width="4"></path>
<path d="M30,90 Q50,50 70,90" fill="none" stroke="#1a1c1c" stroke-linecap="round" stroke-width="4"></path>
</svg>
<svg class="absolute top-6 right-6 w-5 h-5" fill="none" stroke="#1a1c1c" stroke-width="2" viewbox="0 0 24 24">
<path d="M12 2L15 9L22 12L15 15L12 22L9 15L2 12L9 9L12 2Z" fill="#1a1c1c"></path>
</svg>
<div class="relative z-10 flex flex-col h-full justify-between">
<div>
<h4 class="font-headline-md text-dark-pill mb-2 text-2xl leading-tight font-bold">Smart<br/>Money</h4>
<p class="font-body-sm text-dark-pill/80 mb-8">Score improved<br/>to <strong>72/100</strong></p>
</div>
<div class="bg-white text-dark-pill px-4 py-2.5 rounded-full font-label-md w-full text-center group-hover:bg-gray-50 transition-colors">
                                View Insights
                            </div>
</div>
</div>
<!-- Goals Card (Green) -->
<div class="min-w-[220px] bg-accent-green rounded-[2rem] p-6 relative overflow-hidden shrink-0 snap-start shadow-sm cursor-pointer group">

<path d="M40,50 C20,30 10,60 40,65 Z" fill="#ffce00" stroke="#1a1c1c" stroke-linejoin="round" stroke-width="3"></path>
<path d="M40,65 C60,80 70,50 40,50 Z" fill="#ffce00" stroke="#1a1c1c" stroke-linejoin="round" stroke-width="3"></path>
<path d="M40,50 C50,20 80,30 60,60 Z" fill="#ffce00" stroke="#1a1c1c" stroke-linejoin="round" stroke-width="3"></path>
<path d="M40,65 Q35,85 25,95" fill="none" stroke="#1a1c1c" stroke-linecap="round" stroke-width="3"></path>
</svg>
<svg class="absolute top-1/2 right-12 w-3 h-3" fill="none" stroke="#1a1c1c" stroke-width="2" viewbox="0 0 24 24">

<div class="bg-white text-dark-pill px-4 py-2.5 rounded-full font-label-md w-full text-center group-hover:bg-gray-50 transition-colors">

</div>
</div>
</div>

<button class="flex flex-col items-center justify-center w-16 group">
<div class="w-full flex justify-center mb-1 relative">
<div class="w-8 h-1 bg-dark-pill rounded-full absolute top-0 -mt-3"></div>
<span class="material-symbols-outlined text-dark-pill" data-weight="fill" style="font-variation-settings: 'FILL' 1;">home</span>
</div>
<span class="font-label-md text-dark-pill">Home</span>
</button>
<button class="flex flex-col items-center justify-center w-16 group hover:bg-gray-50 transition-colors rounded-xl py-1">
